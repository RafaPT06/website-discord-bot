name: Apply welcome style draft fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-welcome-style-drafts.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Track welcome card settings
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          dashboard_path = Path('public/js/dashboard.js')
          dashboard = dashboard_path.read_text(encoding='utf-8')
          old = """      welcomeChannelId: values.welcomeChannelId || null,
                goodbyeChannelId: values.goodbyeChannelId || null,
                welcomeMessage: values.welcomeMessage || '',
                goodbyeMessage: values.goodbyeMessage || '',
          """
          new = """      welcomeChannelId: values.welcomeChannelId || null,
                goodbyeChannelId: values.goodbyeChannelId || null,
                welcomeStyle: values.welcomeStyle || 'Custom Card (Modern)',
                goodbyeStyle: values.goodbyeStyle || 'Text only',
                welcomeMessage: values.welcomeMessage || '',
                goodbyeMessage: values.goodbyeMessage || '',
                showMember: values.showMember !== false,
                showAvatar: values.showAvatar !== false,
          """
          if new not in dashboard:
              if old not in dashboard:
                  raise SystemExit('Expected welcome payload block was not found.')
              dashboard = dashboard.replace(old, new, 1)
              dashboard_path.write_text(dashboard, encoding='utf-8')

          changelog_path = Path('public/data/changelog.json')
          changelog = json.loads(changelog_path.read_text(encoding='utf-8'))
          item = 'Fixed welcome and goodbye card-style changes so they are tracked as unsaved, saved through the bot API and restored after reloading, including the member-number and avatar card options.'
          if not changelog or changelog[0].get('title') != 'Unified bot-rendered dashboard previews':
              raise SystemExit('Expected current changelog entry was not found.')
          if item not in changelog[0].get('items', []):
              changelog[0].setdefault('items', []).append(item)
              changelog_path.write_text(json.dumps(changelog, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY

          node --check public/js/dashboard.js
          python -m json.tool public/data/changelog.json >/dev/null
          rm .github/workflows/fix-welcome-style-drafts.yml

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/js/dashboard.js public/data/changelog.json .github/workflows/fix-welcome-style-drafts.yml
          git commit -m "Track welcome card style changes"
          git push origin HEAD:main
