name: Restore bot-rendered PNG previews

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-bot-png-previews.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore real bot preview pipeline
        shell: bash
        run: |
          cat > server/api/botApi.js <<'EOF'
          function botApiConfig(options = {}) {
            const botApiUrl = process.env.BOT_API_URL;
            const botApiToken = process.env.BOT_API_TOKEN;
            const timeoutMs = Number(options.timeoutMs || process.env.BOT_API_TIMEOUT_MS || 8000);

            if (!botApiUrl) {
              const error = new Error('BOT_API_URL is not configured on the website service.');
              error.statusCode = 503;
              throw error;
            }

            const headers = { ...(options.headers || {}) };
            if (botApiToken) headers.authorization = `Bearer ${botApiToken}`;
            if (options.body && !headers['content-type']) headers['content-type'] = 'application/json';

            return { botApiUrl, headers, timeoutMs };
          }

          async function fetchBotApi(pathname, options = {}) {
            const { botApiUrl, headers, timeoutMs } = botApiConfig(options);
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            let response;

            try {
              const { timeoutMs: _ignoredTimeout, ...fetchOptions } = options;
              response = await fetch(`${botApiUrl.replace(/\/$/, '')}${pathname}`, {
                ...fetchOptions,
                headers,
                signal: controller.signal,
              });
            } catch (err) {
              const error = new Error(err.name === 'AbortError' ? 'Bot API request timed out.' : `Could not reach BOT_API_URL: ${err.message}`);
              error.statusCode = 502;
              throw error;
            } finally {
              clearTimeout(timeout);
            }

            return response;
          }

          async function requestBotApi(pathname, options = {}) {
            const response = await fetchBotApi(pathname, options);
            const data = await response.json().catch(() => null);

            if (!response.ok) {
              const error = new Error(data?.error || `Bot API returned ${response.status}`);
              error.statusCode = response.status;
              throw error;
            }

            return data;
          }

          async function requestBotApiBuffer(pathname, options = {}) {
            const response = await fetchBotApi(pathname, options);

            if (!response.ok) {
              const data = await response.json().catch(() => null);
              const error = new Error(data?.error || `Bot API returned ${response.status}`);
              error.statusCode = response.status;
              throw error;
            }

            return {
              buffer: Buffer.from(await response.arrayBuffer()),
              contentType: response.headers.get('content-type') || 'application/octet-stream',
            };
          }

          function getBotApiDiagnostics() {
            const botApiUrl = process.env.BOT_API_URL || '';
            return {
              configured: Boolean(botApiUrl),
              hasToken: Boolean(process.env.BOT_API_TOKEN),
              urlHost: botApiUrl ? (() => { try { return new URL(botApiUrl).host; } catch { return 'invalid-url'; } })() : null,
              timeoutMs: Number(process.env.BOT_API_TIMEOUT_MS || 8000),
            };
          }

          module.exports = { requestBotApi, requestBotApiBuffer, getBotApiDiagnostics };
          EOF

          python - <<'PY'
          import json
          from pathlib import Path

          public_api_path = Path('server/routes/publicApi.js')
          public_api = public_api_path.read_text(encoding='utf-8')
          public_api = public_api.replace(
              "const { requestBotApi, getBotApiDiagnostics } = require('../api/botApi');",
              "const { requestBotApi, requestBotApiBuffer, getBotApiDiagnostics } = require('../api/botApi');",
              1,
          )
          public_api = public_api.replace("const { renderPreviewSvg } = require('../previewRenderer');\n", "", 1)
          start = public_api.find("router.post('/dashboard/preview/:kind'")
          end = public_api.find("router.get('/dashboard/servers/:guildId/roles'", start)
          if start < 0 or end < 0:
              raise SystemExit('Preview route markers were not found.')
          preview_route = '''router.post('/dashboard/preview/:kind', requirePreviewAccess, async (req, res) => {
            try {
              const kind = String(req.params.kind || '').trim().toLowerCase();
              if (!['welcome', 'goodbye', 'level-up'].includes(kind)) {
                return res.status(400).json({ ok: false, error: 'Unsupported preview type.' });
              }

              const sessionUser = req.sessionData?.user || {};
              const payload = req.body && typeof req.body === 'object' ? req.body : {};
              const result = await requestBotApiBuffer(`/api/previews/${encodeURIComponent(kind)}`, {
                method: 'POST',
                timeoutMs: 12_000,
                body: JSON.stringify({
                  ...payload,
                  userName: payload.userName || sessionUser.globalName || sessionUser.username || 'Rafa',
                  displayName: payload.displayName || payload.userName || sessionUser.globalName || sessionUser.username || 'Rafa',
                }),
              });

              res.setHeader('Content-Type', result.contentType.startsWith('image/') ? result.contentType : 'image/png');
              res.setHeader('Cache-Control', 'private, no-store, max-age=0');
              return res.send(result.buffer);
            } catch (err) {
              return res.status(err.statusCode || 502).json({ ok: false, error: err.message || 'Could not generate preview.' });
            }
          });

          '''
          public_api = public_api[:start] + preview_route + public_api[end:]
          public_api_path.write_text(public_api, encoding='utf-8')

          api_path = Path('public/js/api.js')
          api = api_path.read_text(encoding='utf-8')
          api_start = api.find('export function requestDashboardPreview')
          if api_start < 0:
              api_start = api.find('export async function requestDashboardPreview')
          if api_start < 0:
              raise SystemExit('requestDashboardPreview was not found.')
          preview_client = '''export async function requestDashboardPreview(kind, payload, { signal } = {}) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 12000);
            const abortFromCaller = () => controller.abort();
            signal?.addEventListener('abort', abortFromCaller, { once: true });

            try {
              const response = await fetch(`/api/dashboard/preview/${encodeURIComponent(kind)}`, {
                method: 'POST',
                cache: 'no-store',
                headers: { 'content-type': 'application/json' },
                signal: controller.signal,
                body: JSON.stringify({ ...(payload || {}), demo: isDemoRoute() }),
              });

              if (!response.ok) {
                const data = await response.json().catch(() => null);
                throw new Error(data?.error || `Preview request failed with ${response.status}`);
              }

              return response.blob();
            } catch (err) {
              if (err?.name === 'AbortError') throw new Error('Preview request timed out.');
              throw err;
            } finally {
              clearTimeout(timeout);
              signal?.removeEventListener('abort', abortFromCaller);
            }
          }
          '''
          api = api[:api_start] + preview_client
          api_path.write_text(api, encoding='utf-8')

          dashboard_path = Path('public/js/dashboard.js')
          dashboard = dashboard_path.read_text(encoding='utf-8')
          block_start = dashboard.find('const previewResponseCache = new Map();')
          block_end = dashboard.find('function serverIcon(', block_start)
          if block_start < 0 or block_end < 0:
              raise SystemExit('Dashboard preview block markers were not found.')
          preview_block = '''const previewResponseCache = new Map();
          const previewTimers = new Map();
          const previewControllers = new Map();
          const MAX_PREVIEW_CACHE = 24;

          function livePreviewShell(kind, alt, label = 'Generating preview…') {
            return `<div class="dash-live-preview is-loading" data-live-preview="${escapeHtml(kind)}"><img alt="${escapeHtml(alt)}" loading="lazy" hidden /><div class="dash-live-preview-state"><strong>${escapeHtml(label)}</strong><span>Updates live while you edit.</span></div></div>`;
          }
          function previewCacheKey(kind, payload) {
            return `${kind}:${stableStringify(payload)}`;
          }
          function setPreviewState(host, state, message, detail) {
            if (!host) return;
            host.classList.toggle('is-loading', state === 'loading');
            host.classList.toggle('is-error', state === 'error');
            const stateBox = host.querySelector('.dash-live-preview-state');
            if (stateBox) stateBox.innerHTML = `<strong>${escapeHtml(message || 'Preview')}</strong><span>${escapeHtml(detail || '')}</span>`;
          }
          function cachePreviewUrl(key, url) {
            previewResponseCache.set(key, url);
            while (previewResponseCache.size > MAX_PREVIEW_CACHE) {
              const oldestKey = previewResponseCache.keys().next().value;
              const oldestUrl = previewResponseCache.get(oldestKey);
              previewResponseCache.delete(oldestKey);
              if (oldestUrl) URL.revokeObjectURL(oldestUrl);
            }
          }
          function cancelLivePreview(kind) {
            const timer = previewTimers.get(kind);
            if (timer) clearTimeout(timer);
            previewTimers.delete(kind);
            previewControllers.get(kind)?.abort?.();
            previewControllers.delete(kind);
          }
          async function runLivePreview(host, kind, payload) {
            if (!host?.isConnected || !payload) return;
            const key = previewCacheKey(kind, payload);
            const cached = previewResponseCache.get(key);
            const img = host.querySelector('img');
            if (cached && img) {
              img.src = cached;
              img.hidden = false;
              setPreviewState(host, 'ready', 'Preview ready', '');
              return;
            }

            previewControllers.get(kind)?.abort?.();
            const controller = new AbortController();
            previewControllers.set(kind, controller);
            setPreviewState(host, 'loading', 'Generating preview…', 'Updates live while you edit.');

            try {
              const blob = await requestDashboardPreview(kind, payload, { signal: controller.signal });
              if (controller.signal.aborted || !host.isConnected) return;
              const imageUrl = URL.createObjectURL(blob);
              cachePreviewUrl(key, imageUrl);
              if (img) {
                img.src = imageUrl;
                img.hidden = false;
              }
              setPreviewState(host, 'ready', 'Preview ready', '');
            } catch (err) {
              if (controller.signal.aborted || !host.isConnected) return;
              setPreviewState(host, 'error', 'Preview unavailable', err.message || 'The live preview could not be generated.');
            } finally {
              if (previewControllers.get(kind) === controller) previewControllers.delete(kind);
            }
          }
          function scheduleLivePreview(host, kind, payload, delay = 320) {
            if (!host || !payload) return;
            const existing = previewTimers.get(kind);
            if (existing) clearTimeout(existing);
            const timeout = setTimeout(() => {
              previewTimers.delete(kind);
              runLivePreview(host, kind, payload);
            }, delay);
            previewTimers.set(kind, timeout);
          }
          function buildWelcomePreviewPayload(server, settings, kind = 'welcome') {
            return {
              kind,
              serverName: String(server?.name || '').trim() || 'PERSONAL',
              guildName: String(server?.name || '').trim() || 'PERSONAL',
              userName: activeName(),
              avatarUrl: userAvatarUrl(activeUser(), 256),
              memberCount: Number(server?.memberCount || 11),
              showMember: settings.showMember !== false,
              showAvatar: settings.showAvatar !== false,
              message: kind === 'goodbye' ? (settings.goodbyeMessage || 'GOODBYE {user}\\nLEFT\\n{server}') : (settings.welcomeMessage || 'WELCOME {user}\\nTO\\n{server}'),
              messageTemplate: kind === 'goodbye' ? (settings.goodbyeMessage || 'GOODBYE {user}\\nLEFT\\n{server}') : (settings.welcomeMessage || 'WELCOME {user}\\nTO\\n{server}'),
            };
          }
          function hydrateWelcomePreview(server, settings) {
            const welcomeHost = document.querySelector('[data-live-preview="welcome"]');
            const goodbyeHost = document.querySelector('[data-live-preview="goodbye"]');
            if (welcomeHost && settings.welcomeStyle !== 'Text only') scheduleLivePreview(welcomeHost, 'welcome', buildWelcomePreviewPayload(server, settings, 'welcome'));
            else cancelLivePreview('welcome');
            if (goodbyeHost && settings.goodbyeStyle !== 'Text only') scheduleLivePreview(goodbyeHost, 'goodbye', buildWelcomePreviewPayload(server, settings, 'goodbye'));
            else cancelLivePreview('goodbye');
          }
          function levelPreviewStats(settings = {}) {
            if (isDemoMode()) {
              const progress = Math.min(100, Math.round((DEMO_LEVELING.xp / DEMO_LEVELING.nextLevelXp) * 100));
              return {
                level: DEMO_LEVELING.level,
                nextLevel: DEMO_LEVELING.level + 1,
                currentXp: DEMO_LEVELING.xp,
                requiredXp: DEMO_LEVELING.nextLevelXp,
                totalXp: DEMO_LEVELING.xp + 10600,
                progress,
              };
            }
            const xpPerMessage = Math.max(1, Number(settings.xpPerMessage || settings.xp || 15));
            const level = 10;
            const requiredXp = 999;
            const currentXp = Math.min(requiredXp - 1, Math.max(30, xpPerMessage * 32));
            return {
              level,
              nextLevel: level + 1,
              currentXp,
              requiredXp,
              totalXp: currentXp + 10240,
              progress: Math.min(100, Math.round((currentXp / requiredXp) * 100)),
            };
          }
          function buildLevelPreviewPayload(server, settings) {
            const stats = levelPreviewStats(settings);
            return {
              serverName: String(server?.name || '').trim() || 'PERSONAL',
              guildName: String(server?.name || '').trim() || 'PERSONAL',
              userName: activeName(),
              avatarUrl: userAvatarUrl(activeUser(), 256),
              ...stats,
              neededXp: stats.requiredXp,
            };
          }
          function hydrateLevelPreview(server, settings, host = document.querySelector('[data-live-preview="level-up"]')) {
            if (!host) return;
            scheduleLivePreview(host, 'level-up', buildLevelPreviewPayload(server, settings));
          }
          '''
          dashboard = dashboard[:block_start] + preview_block + dashboard[block_end:]
          dashboard_path.write_text(dashboard, encoding='utf-8')

          changelog_path = Path('public/data/changelog.json')
          changelog = json.loads(changelog_path.read_text(encoding='utf-8'))
          title = 'Restored exact bot-rendered PNG previews'
          if not any(entry.get('title') == title for entry in changelog if isinstance(entry, dict)):
              changelog.insert(0, {
                  'date': '2026-07-11',
                  'title': title,
                  'items': [
                      'Removed the duplicate website SVG card renderer and restored the preview proxy to the Discord bot PNG renderer.',
                      'Welcome, goodbye and level-up previews now use the same Unicode-aware text, emoji rendering, spacing and background as the actual bot cards.',
                      'Kept live unsaved previews, request cancellation, bounded object-URL caching, demo support and transparent loaded preview frames.'
                  ]
              })
              changelog_path.write_text(json.dumps(changelog, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY

          rm -f server/previewRenderer.js
          node --check server/api/botApi.js
          node --check server/routes/publicApi.js
          node --check public/js/api.js
          node --check public/js/dashboard.js
          python -m json.tool public/data/changelog.json >/dev/null
          rm .github/workflows/restore-bot-png-previews.yml

      - name: Commit restoration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/api/botApi.js server/routes/publicApi.js public/js/api.js public/js/dashboard.js public/data/changelog.json server/previewRenderer.js .github/workflows/restore-bot-png-previews.yml
          git commit -m "Restore exact bot-rendered PNG previews"
          git push origin HEAD:main
