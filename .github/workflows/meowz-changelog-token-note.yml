name: Correct API token changelog note

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/meowz-changelog-token-note.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct changelog wording
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('public/data/changelog.json')
          text = path.read_text()
          old = 'Hardened production bot API startup, isolated welcome/goodbye delivery from activity logging failures, and stabilized profile-card backgrounds.'
          new = 'Added a clear production warning when BOT_API_TOKEN is missing, isolated welcome/goodbye delivery from activity logging failures, and stabilized profile-card backgrounds.'
          if old not in text and new not in text:
              raise SystemExit('Expected changelog text was not found.')
          path.write_text(text.replace(old, new))
          PY
          python -m json.tool public/data/changelog.json >/dev/null
      - name: Commit correction
        run: |
          git config user.name "Meowz Automation"
          git config user.email "actions@github.com"
          git add public/data/changelog.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Clarify bot API token changelog note"
          git push
