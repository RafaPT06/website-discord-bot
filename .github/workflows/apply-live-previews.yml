name: Apply live dashboard previews

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-live-previews.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply preview patch
        run: |
          base64 -d scripts/live-previews.patch.gz.b64 | gzip -d > /tmp/live-previews.patch
          git apply /tmp/live-previews.patch

      - name: Verify files
        run: |
          node --check server/previewRenderer.js
          node --check server/routes/publicApi.js
          node --check public/js/api.js
          node --check public/js/dashboard.js
          python -m json.tool public/data/changelog.json >/dev/null

      - name: Commit live previews
        run: |
          rm -f scripts/live-previews.patch.gz.b64
          rm -f .github/workflows/apply-live-previews.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add live dashboard previews"
          git push
