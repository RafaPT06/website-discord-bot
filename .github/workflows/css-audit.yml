name: Website Audit

on:
  pull_request:
    paths:
      - 'public/**/*.css'
      - 'public/**/*.html'
      - 'public/**/*.js'
      - 'server/**/*.js'
      - 'scripts/css-audit.js'
      - 'package.json'
      - '.github/workflows/css-audit.yml'
  push:
    branches:
      - main
    paths:
      - 'public/**/*.css'
      - 'public/**/*.html'
      - 'public/**/*.js'
      - 'server/**/*.js'
      - 'scripts/css-audit.js'
      - 'package.json'
      - '.github/workflows/css-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  website-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check dashboard and server JavaScript
        run: |
          node --check server/app.js
          node --check server/routes/dashboardReliability.js
          node --check server/routes/dashboardRoles.js
          node --input-type=module --check < public/js/main.js
          node --input-type=module --check < public/js/api.js
          node --input-type=module --check < public/js/components/customSelect.js
          node --input-type=module --check < public/js/components/dashboardReliability.js
          node --input-type=module --check < public/js/components/forms.js
          node --input-type=module --check < public/js/components/levelingRoleManager.js
          node --input-type=module --check < public/js/components/dashboardDialogMarkup.js
          node --input-type=module --check < public/js/components/dashboardDialog.js
          node --input-type=module --check < public/js/components/levelingRoleActions.js
          node --input-type=module --check < public/js/components/roleApi.js

      - name: Audit stylesheets and references
        run: npm run audit:css

      - name: Upload CSS audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: css-audit-report
          path: css-audit-report.json
          if-no-files-found: error
          retention-days: 14
