name: CSS Audit

on:
  pull_request:
    paths:
      - 'public/**/*.css'
      - 'public/**/*.html'
      - 'public/**/*.js'
      - 'scripts/css-audit.js'
      - 'package.json'
      - '.github/workflows/css-audit.yml'
  push:
    branches:
      - main
    paths:
      - 'public/**/*.css'
      - 'public/**/*.html'
      - 'public/**/*.js'
      - 'scripts/css-audit.js'
      - 'package.json'
      - '.github/workflows/css-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  css-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Audit stylesheets and references
        run: npm run audit:css
