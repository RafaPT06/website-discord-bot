name: Apply preview height fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-preview-height.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply CSS and changelog update
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          css_path = Path('public/css/main.css')
          css = css_path.read_text(encoding='utf-8')
          old = """.dash-live-preview img {
            display: block;
            width: 100%;
            height: auto;
            background: #08090d;
          }
          """
          new = """.dash-live-preview img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: auto;
            background: #08090d;
          }
          /* Once a PNG is ready, let its intrinsic aspect ratio define the wrapper height.
             This prevents Android font scaling from turning the loading min-height into
             a large empty band below the rendered card. */
          .dash-live-preview:not(.is-loading):not(.is-error) {
            min-height: 0;
          }
          """

          if new not in css:
              if old not in css:
                  raise SystemExit('Expected live preview CSS block was not found.')
              css = css.replace(old, new, 1)
              css_path.write_text(css, encoding='utf-8')

          changelog_path = Path('public/data/changelog.json')
          changelog = json.loads(changelog_path.read_text(encoding='utf-8'))
          item = 'Made live preview containers collapse to the exact PNG height after loading, removing the empty black area below welcome, goodbye and level-up cards on Android and other large-font displays.'
          if not changelog or changelog[0].get('title') != 'Unified bot-rendered dashboard previews':
              raise SystemExit('Expected current changelog entry was not found.')
          if item not in changelog[0].get('items', []):
              changelog[0].setdefault('items', []).append(item)
              changelog_path.write_text(json.dumps(changelog, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY

          python -m json.tool public/data/changelog.json >/dev/null
          rm .github/workflows/fix-preview-height.yml

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/css/main.css public/data/changelog.json .github/workflows/fix-preview-height.yml
          git commit -m "Fix live preview container height"
          git push origin HEAD:main
