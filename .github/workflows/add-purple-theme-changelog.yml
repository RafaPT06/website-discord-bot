name: Add purple theme changelog

on:
  push:
    branches:
      - changelog/purple-theme

permissions:
  contents: write

jobs:
  update-changelog:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out changelog branch
        uses: actions/checkout@v4
        with:
          ref: changelog/purple-theme
          fetch-depth: 0

      - name: Update changelog
        run: node scripts/add-purple-theme-changelog.js

      - name: Validate JSON
        run: node -e "JSON.parse(require('node:fs').readFileSync('public/data/changelog.json', 'utf8'))"

      - name: Commit changelog
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/changelog.json
          if git diff --cached --quiet; then
            echo "No changelog change to commit."
            exit 0
          fi
          git commit -m "Document unified purple bot visuals"
          git push origin HEAD:changelog/purple-theme
