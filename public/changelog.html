<!DOCTYPE html>
<html lang="en" data-theme="dark" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8" />

  <title>Changelog — Meowz</title>
  <meta name="description" content="See the latest Meowz website updates." />

  <meta property="og:title" content="Meowz | Discord Bot" />

  <meta property="og:url" content="https://meowz.up.railway.app/" />

  <meta name="theme-color" content="#8b5cf6" />
  <meta name="color-scheme" content="dark" />

  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/changelog-page.css" />
  <link rel="stylesheet" href="/css/changelog-custom-select.css" />

</head>
<body>
  <div class="bg-glow bg-glow-one"></div>
  <div class="bg-glow bg-glow-two"></div>

  <header class="nav" data-global-navbar>
    <a class="brand" href="/" aria-label="Meowz home">
      <span class="brand-icon" data-bot-avatar-small>M</span>
      <span data-bot-name-short>Meowz</span>
    </a>
    <button class="mobile-menu-button" type="button" data-menu-toggle aria-label="Open navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-links" data-nav-links aria-label="Main navigation">
      <a href="/" data-nav-link data-route="/">Home</a>
      <a href="/dashboard" data-nav-link data-route="/dashboard" data-auth-only hidden>Dashboard</a>
      <a href="/docs" data-nav-link data-route="/docs">Documentation</a>
      <a href="/changelog" data-nav-link data-route="/changelog">Changelog</a>
      <a href="/dashboard/settings" data-nav-link data-route="/dashboard/settings">Settings</a>
      <div class="auth-area auth-loading" data-auth-area>Checking login...</div>
    </nav>

  <main id="top" class="page-main">
    <section class="section changelog-section">
      <div class="section-heading page-header page-heading">
        <span>Changelog</span>
        <h2>Latest website updates</h2>
      </div>
      <div class="changelog-list" data-changelog-list>
        <article class="changelog-card skeleton-block"></article>
        <article class="changelog-card skeleton-block"></article>
      </div>
    </section>
  </main>

  <footer class="footer-card">
    <p>© <span data-footer-year></span> <span data-footer-bot-name>Meowz</span>. All rights reserved.</p>
    <p>Made by Rafa (@atuaprima_)</p>
  </footer>

  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/changelog-custom-select.js"></script>
