<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Meowz</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script>
    (function () {
      try {
        var prefs = JSON.parse(localStorage.getItem('meowzDashboardPreferences') || '{}');
        var theme = prefs.theme || localStorage.getItem('meowzTheme') || 'dark';
        if (theme !== 'light' && theme !== 'dark') theme = 'dark';
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/light-public-base.css" />
  <link rel="stylesheet" href="/css/modal-audit.css" />
</head>
<body>
  <div class="bg-glow bg-glow-one"></div>
  <div class="bg-glow bg-glow-two"></div>

  <main class="not-found-page">
    <section class="not-found-card">
      <span>404</span>
      <h1>Page not found</h1>
      <p>Meowz could not find the page you were looking for.</p>
      <a class="btn btn-primary" href="/">Return Home</a>
    </section>
  </main>

  <script type="module" src="/js/standalone-language.js"></script>
</body>
</html>
