<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Meowz</title>
  <meta name="description" content="Manage your Meowz servers after signing in with Discord." />
  <meta property="og:title" content="Meowz | Discord Bot" />
  <meta property="og:description" content="A modern Discord bot with live stats, slash command docs, AI image editing, leveling and utilities." />
  <meta property="og:image" content="https://meowz.up.railway.app/preview.png" />
  <meta property="og:url" content="https://meowz.up.railway.app/" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#8b5cf6" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="dashboard-app-body">
  <div class="bg-glow bg-glow-one"></div>
  <div class="bg-glow bg-glow-two"></div>

  <header class="nav dashboard-auth-nav" aria-label="Dashboard auth shell">
    <a class="brand" href="/" aria-label="Meowz home">
      <span class="brand-icon" data-bot-avatar-small>M</span>
      <span data-bot-name-short>Meowz</span>
    </a>
    <button class="mobile-menu-button" type="button" data-menu-toggle aria-label="Open navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-links" data-nav-links aria-label="Main navigation">
      <a href="/" data-nav-link data-route="/">Home</a>
      <a class="auth-only-nav" href="/dashboard" data-nav-link data-route="/dashboard" data-auth-only hidden>Dashboard</a>
      <a href="/docs" data-nav-link data-route="/docs">Documentation</a>
      <a href="/changelog" data-nav-link data-route="/changelog">Changelog</a>
      <div class="auth-area auth-loading" data-auth-area>Checking login...</div>
    </nav>
  </header>

  <main id="top" class="dashboard-app-root">
    <section class="dashboard-app" data-dashboard hidden>
      <div data-dashboard-home></div>
      <div data-server-detail hidden>
        <div data-server-detail-content></div>
      </div>
    </section>

    <section class="dashboard-login-screen" data-dashboard-guest hidden>
      <div class="dashboard-login-card">
        <span class="dashboard-card-label">Dashboard</span>
        <h1>Login required</h1>
        <p>Connect your Discord account to manage Meowz servers.</p>
        <a class="btn btn-primary" href="/auth/discord">Login with Discord</a>
      </div>
    </section>
  </main>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
